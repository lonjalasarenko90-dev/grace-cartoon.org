<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Будячок-Святий — Плакат</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0A0604;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
  font-family: 'Cormorant Garamond', serif;
}

.poster-wrap {
  position: relative;
  width: min(520px, 95vw);
}

/* Outer ornamental border */
.poster-outer-border {
  position: absolute;
  inset: -18px;
  border: 1px solid rgba(201,147,58,0.25);
  pointer-events: none;
  z-index: 20;
}
.poster-outer-border::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(201,147,58,0.12);
}

/* Corner ornaments */
.corner {
  position: absolute;
  width: 36px; height: 36px;
  z-index: 21;
  pointer-events: none;
}
.corner svg { width:100%; height:100%; }
.corner-tl { top:-18px; left:-18px; }
.corner-tr { top:-18px; right:-18px; transform:scaleX(-1); }
.corner-bl { bottom:-18px; left:-18px; transform:scaleY(-1); }
.corner-br { bottom:-18px; right:-18px; transform:scale(-1,-1); }

/* Main poster */
.poster {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  overflow: hidden;
  background: #0D0806;
}

/* ── SKY / BACKGROUND LAYERS ── */
.bg-sky {
  position: absolute; inset: 0;
  background: 
    radial-gradient(ellipse at 50% -10%, rgba(201,147,58,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 60%, rgba(123,79,142,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 70%, rgba(43,79,138,0.10) 0%, transparent 40%),
    linear-gradient(180deg, #120A04 0%, #1E0E06 30%, #0A0604 60%, #06030A 100%);
}

/* Stars */
.stars {
  position: absolute; inset: 0; pointer-events: none;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100%{ opacity:0.2; transform:scale(0.8); }
  50%    { opacity:0.9; transform:scale(1.2); }
}

/* Ground mist */
.ground-mist {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 35%;
  background: linear-gradient(to top, rgba(10,6,4,0.95), transparent);
  z-index: 2;
}

/* City silhouette */
.city-layer {
  position: absolute;
  bottom: 16%;
  left: 0; right: 0;
  height: 20%;
  z-index: 3;
}

/* Thistle field bottom */
.thistle-field {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 20%;
  z-index: 4;
}

/* ── CHARACTERS ── */
.characters-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
}

/* ── TITLE AREA ── */
.title-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 15;
  padding: 0 30px 28px;
  background: linear-gradient(to top, rgba(6,3,10,0.98) 40%, transparent);
  text-align: center;
}

.title-ic-xc {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 8px;
}
.ic-xc {
  font-family: 'Cinzel Decorative', cursive;
  font-size: 11px;
  color: rgba(201,147,58,0.6);
  letter-spacing: 3px;
  border-bottom: 1px solid rgba(201,147,58,0.3);
  padding-bottom: 2px;
}

.title-ornament {
  display: flex; align-items: center; gap: 12px;
  justify-content: center;
  margin-bottom: 6px;
}
.orn-line { flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(201,147,58,0.4),transparent); max-width:60px; }
.orn-sym  { color:rgba(201,147,58,0.6); font-size:12px; }

.title-main {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(22px, 5.5vw, 34px);
  font-weight: 900;
  color: #E8C46A;
  line-height: 1.15;
  text-shadow:
    0 0 30px rgba(201,147,58,0.5),
    0 0 80px rgba(201,147,58,0.2);
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.title-and {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px,2.5vw,15px);
  font-style: italic;
  color: rgba(201,147,58,0.5);
  letter-spacing: 4px;
  margin-bottom: 2px;
}

.title-sub {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(13px,3vw,18px);
  color: rgba(196,154,216,0.85);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(123,79,142,0.5);
  margin-bottom: 16px;
}

.title-divider {
  width: 80px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(201,147,58,0.5), transparent);
  margin: 8px auto;
}

.title-tagline {
  font-size: clamp(11px,2vw,13px);
  font-style: italic;
  color: rgba(244,235,216,0.4);
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.title-credits {
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(244,235,216,0.2);
  text-transform: uppercase;
}

/* Top header */
.top-header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 15;
  padding: 18px 30px 0;
  text-align: center;
  background: linear-gradient(to bottom, rgba(6,3,10,0.8), transparent);
}
.top-studio {
  font-size: 9px; letter-spacing: 5px;
  color: rgba(201,147,58,0.45);
  text-transform: uppercase;
}
.top-line { width:40px; height:1px; background:rgba(201,147,58,0.2); margin:5px auto; }

/* Halo glow behind main character */
.halo-glow {
  position: absolute;
  width: 52%;
  padding-bottom: 52%;
  border-radius: 50%;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(201,147,58,0.22) 0%, rgba(201,147,58,0.08) 40%, transparent 70%);
  filter: blur(8px);
  z-index: 5;
  animation: haloAnim 4s ease-in-out infinite alternate;
}
@keyframes haloAnim {
  from { opacity:0.7; transform:translateX(-50%) scale(0.95); }
  to   { opacity:1;   transform:translateX(-50%) scale(1.05); }
}
</style>
</head>
<body>

<div class="poster-wrap">
  <!-- Outer border -->
  <div class="poster-outer-border"></div>

  <!-- Corners -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 36 36"><path d="M2 34 L2 2 L34 2" stroke="#C9933A" stroke-width="1" fill="none" opacity="0.5"/><circle cx="2" cy="2" r="2" fill="#C9933A" opacity="0.6"/></svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 36 36"><path d="M2 34 L2 2 L34 2" stroke="#C9933A" stroke-width="1" fill="none" opacity="0.5"/><circle cx="2" cy="2" r="2" fill="#C9933A" opacity="0.6"/></svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 36 36"><path d="M2 34 L2 2 L34 2" stroke="#C9933A" stroke-width="1" fill="none" opacity="0.5"/><circle cx="2" cy="2" r="2" fill="#C9933A" opacity="0.6"/></svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 36 36"><path d="M2 34 L2 2 L34 2" stroke="#C9933A" stroke-width="1" fill="none" opacity="0.5"/><circle cx="2" cy="2" r="2" fill="#C9933A" opacity="0.6"/></svg>

  <div class="poster">
    <!-- Background -->
    <div class="bg-sky"></div>
    <div class="stars" id="starsEl"></div>

    <!-- Top studio label -->
    <div class="top-header">
      <div class="top-studio">Homo Thistlis Presents</div>
      <div class="top-line"></div>
    </div>

    <!-- Halo glow -->
    <div class="halo-glow"></div>

    <!-- Ground mist -->
    <div class="ground-mist"></div>

    <!-- ALL CHARACTERS SVG (full poster composition) -->
    <div class="characters-layer">
      <svg width="100%" height="100%" viewBox="0 0 520 780" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Gradients -->
          <radialGradient id="haloP" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F8E060"/>
            <stop offset="50%" stop-color="#C9933A"/>
            <stop offset="100%" stop-color="rgba(201,147,58,0.05)"/>
          </radialGradient>
          <radialGradient id="skinMain" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#E8B888"/>
            <stop offset="100%" stop-color="#C08050"/>
          </radialGradient>
          <radialGradient id="skinNadia" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#FCD0A0"/>
            <stop offset="100%" stop-color="#E0A070"/>
          </radialGradient>
          <radialGradient id="skinPr" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#C0906A"/>
            <stop offset="100%" stop-color="#906040"/>
          </radialGradient>
          <radialGradient id="beetleR" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#222"/>
            <stop offset="100%" stop-color="#060606"/>
          </radialGradient>
          <filter id="glow1"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="softS"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="shadowF"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(0,0,0,0.7)"/></filter>
        </defs>

        <!-- ══════════════════════════════
             CITY SILHOUETTE
        ══════════════════════════════ -->
        <g opacity="0.4">
          <!-- Buildings left -->
          <rect x="0"   y="500" width="35"  height="100" fill="#0E0806"/>
          <rect x="5"   y="480" width="25"  height="20"  fill="#0E0806"/>
          <rect x="40"  y="510" width="28"  height="90"  fill="#100A07"/>
          <rect x="72"  y="495" width="22"  height="105" fill="#0E0806"/>

          <!-- Buildings right -->

          <path d="M420 780 Q418 740 416 700 Q414 668 412 645" stroke="#3A6030" stroke-width="2" fill="none"/>
          <circle cx="412" cy="634" r="12" fill="#5A3F6E" opacity="0.6"/>
        </g>

        <!-- ══════════════════════════════
             ANTAGONIST — PROROK (back left, shadowy)
        ══════════════════════════════ -->
        <g opacity="0.55" transform="translate(55, 370) scale(0.62)" filter="url(#shadowF)">
          <!-- Robe -->
          <ellipse cx="100" cy="320" rx="68" ry="60" fill="#0D0A06"/>
          <path d="M38 285 Q48 260 62 265 L60 365Z" fill="#141006"/>
          <path d="M162 285 Q152 260 138 265 L140 365Z" fill="#080604"/>
          <!-- White collar small -->
          <path d="M76 270 Q100 262 124 270 Q116 280 100 282 Q84 280 76 270Z" fill="rgba(180,160,120,0.7)"/>
          <!-- Head -->
          <ellipse cx="100" cy="180" rx="38" ry="42" fill="url(#skinPr)"/>
          <!-- Grey hair -->
          <path d="M62 178 Q59 148 72 134 Q82 122 100 118 Q118 122 128 134 Q141 148 138 178 Q128 158 120 150 Q110 144 100 146 Q90 144 80 150 Q72 158 62 178Z" fill="#6A5A48"/>
          <!-- Stern face -->
          <ellipse cx="86"  cy="176" rx="7" ry="6.5" fill="#1A0A00"/>
          <ellipse cx="114" cy="176" rx="7" ry="6.5" fill="#1A0A00"/>
          <path d="M80 168 Q86 164 92 168" stroke="#4A3020" stroke-width="3" fill="none"/>
          <path d="M108 168 Q114 164 120 168" stroke="#4A3020" stroke-width="3" fill="none"/>
          <path d="M85 202 Q100 198 115 202" stroke="#7A4520" stroke-width="2" fill="none"/>
          <!-- Beard -->
          <path d="M74 206 Q78 230 100 240 Q122 230 126 206 Q114 218 100 220 Q86 218 74 206Z" fill="#6A5A48"/>
          <!-- Scroll -->
          <rect x="128" y="268" width="48" height="65" rx="4" fill="#F0E8D0" opacity="0.8"/>

          <path d="M46 310 L36 304" stroke="#906040" stroke-width="5" fill="none" stroke-linecap="round"/>
        </g>

        <!-- ══════════════════════════════
             NADIYA — right side, slightly behind
        ══════════════════════════════ -->
        <g transform="translate(308, 330) scale(0.72)" filter="url(#shadowF)">
          <!-- Dress -->
          <ellipse cx="100" cy="300" rx="58" ry="56" fill="#4A7842"/>
          <path d="M48 268 Q58 246 72 250 L70 340Z" fill="#5A8850"/>
          <path d="M152 268 Q142 246 128 250 L130 340Z" fill="#3A6832"/>
          <!-- Hair braids -->

          <path d="M130 148 Q142 166 146 194 Q148 210 144 228" stroke="#7B3D18" stroke-width="13" fill="none" stroke-linecap="round"/>

          <ellipse cx="100" cy="140" rx="32" ry="36" fill="url(#skinNadia)"/>

          <ellipse cx="114" cy="138" rx="6.5" ry="7.5" fill="#2A1008"/>
          <ellipse cx="84"  cy="136" rx="3"   ry="3.5" fill="white"/>
          <ellipse cx="112" cy="136" rx="3"   ry="3.5" fill="white"/>
          <!-- Rosy cheeks -->
          <ellipse cx="76"  cy="150" rx="10" ry="6" fill="rgba(240,130,100,0.25)"/>
          <ellipse cx="124" cy="150" rx="10" ry="6" fill="rgba(240,130,100,0.25)"/>
          <!-- Smile -->
          <path d="M88 162 Q100 170 112 162" stroke="#9B5020" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Small thistle -->

          <circle cx="146" cy="206" r="12" fill="#7B4F8E" opacity="0.8"/>
          <circle cx="146" cy="197" r="7" fill="#C480D8" opacity="0.65"/>
        </g>

        <!-- ══════════════════════════════
             ЖУК — tiny, lurking in shadow top-right
        ══════════════════════════════ -->
        <g transform="translate(378, 80) scale(0.28)" opacity="0.75">
          <ellipse cx="100" cy="160" rx="65" ry="80" fill="url(#beetleR)"/>
          <path d="M100 85 L100 238" stroke="rgba(50,50,50,0.8)" stroke-width="2"/>
          <ellipse cx="100" cy="100" rx="38" ry="26" fill="#141414"/>
          <ellipse cx="100" cy="82" rx="32" ry="26" fill="#0E0E0E"/>
          <!-- Eyes red glow -->
          <ellipse cx="82" cy="80" rx="13" ry="15" fill="#330000"/>
          <ellipse cx="118" cy="80" rx="13" ry="15" fill="#330000"/>
          <ellipse cx="82" cy="80" rx="8" ry="10" fill="#880000"/>
          <ellipse cx="118" cy="80" rx="8" ry="10" fill="#880000"/>
          <ellipse cx="82" cy="80" rx="4" ry="5" fill="#DD0000"/>
          <ellipse cx="118" cy="80" rx="4" ry="5" fill="#DD0000"/>
          <ellipse cx="82" cy="80" rx="14" ry="16" fill="none" stroke="rgba(220,0,0,0.25)" stroke-width="4"/>
          <ellipse cx="118" cy="80" rx="14" ry="16" fill="none" stroke="rgba(220,0,0,0.25)" stroke-width="4"/>
          <!-- Antennae -->
          <path d="M86 58 Q74 38 62 22" stroke="#222" stroke-width="2.5" fill="none"/>
          <circle cx="60" cy="19" r="5" fill="#1A1A1A"/>
          <path d="M114 58 Q126 38 138 22" stroke="#222" stroke-width="2.5" fill="none"/>
          <circle cx="140" cy="19" r="5" fill="#1A1A1A"/>
          <!-- Legs -->
          <path d="M42 130 Q24 124 10 132" stroke="#181818" stroke-width="4" fill="none"/>
          <path d="M40 155 Q22 155 8 165" stroke="#181818" stroke-width="4" fill="none"/>
          <path d="M158 130 Q176 124 190 132" stroke="#181818" stroke-width="4" fill="none"/>
          <path d="M160 155 Q178 155 192 165" stroke="#181818" stroke-width="4" fill="none"/>
          <!-- Whisper -->
          <ellipse cx="42" cy="48" rx="34" ry="18" fill="rgba(15,8,4,0.85)" stroke="rgba(100,20,0,0.3)" stroke-width="1"/>
          <text x="20" y="54" font-size="11" font-style="italic" fill="rgba(200,60,60,0.7)" font-family="serif">недостатній…</text>
        </g>

        <!-- ══════════════════════════════
             MAIN CHARACTER — BUDYACHOK (center, large)
        ══════════════════════════════ -->
        <g transform="translate(105, 60) scale(1.0)" filter="url(#shadowF)">
          <!-- BIG HALO GLOW -->
          <circle cx="205" cy="200" r="145" fill="rgba(201,147,58,0.08)" filter="url(#softS)"/>
          <circle cx="205" cy="200" r="130" fill="rgba(201,147,58,0.05)" filter="url(#softS)"/>

          <!-- HALO -->
          <circle cx="205" cy="200" r="115" fill="url(#haloP)"/>
          <circle cx="205" cy="200" r="115" fill="none" stroke="#C9933A" stroke-width="2" opacity="0.65"/>
          <circle cx="205" cy="200" r="108" fill="none" stroke="rgba(201,147,58,0.3)" stroke-width="0.8"/>
          <!-- Halo cross lines -->
          <line x1="90"  y1="200" x2="320" y2="200" stroke="#C9933A" stroke-width="1" opacity="0.4"/>
          <line x1="205" y1="85"  x2="205" y2="315" stroke="#C9933A" stroke-width="1" opacity="0.4"/>
          <!-- Halo inner circle segments -->
          <circle cx="205" cy="200" r="85" fill="none" stroke="rgba(201,147,58,0.2)" stroke-width="0.6"/>

          <!-- ΩΝ letters in halo -->
          <text x="178" y="210" font-size="22" font-family="serif" fill="#8B6020" opacity="0.55">ω</text>
          <text x="218" y="210" font-size="22" font-family="serif" fill="#8B6020" opacity="0.55">Ν</text>

          <!-- BLUE ROBE — large, flowing -->
          <ellipse cx="205" cy="580" rx="110" ry="95" fill="#1E3870"/>
          <path d="M102 510 Q116 475 135 482 L132 650 Q116 656 100 634Z" fill="#2A4E90"/>
          <path d="M308 510 Q294 475 275 482 L278 650 Q294 656 310 634Z" fill="#142860"/>
          <!-- Robe folds -->
          <path d="M148 490 L144 632 M165 486 L161 628 M245 490 L249 632 M228 486 L232 628" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

          <!-- RED inner robe -->
          <path d="M162 468 Q205 454 248 468 L252 636 Q205 646 158 636Z" fill="#8B1E30"/>
          <path d="M180 468 L177 630 M205 460 L205 638 M230 468 L233 630" stroke="#6A1020" stroke-width="1.5" opacity="0.35"/>

          <!-- NECK -->
          <rect x="193" y="370" width="24" height="35" fill="#C08050" rx="4"/>

          <!-- HEAD -->
